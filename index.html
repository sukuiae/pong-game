<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: black;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        canvas {\n            border: 2px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const ballSize = 10;\n\n        let player = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            score: 0\n        };\n\n        let ai = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            score: 0\n        };\n\n        let ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            size: ballSize,\n            speed: 5,\n            velocityX: 5,\n            velocityY: 5\n        };\n\n        function drawRect(x, y, width, height, color) {\n            context.fillStyle = color;\n            context.fillRect(x, y, width, height);\n        }\n\n        function drawBall(x, y, size, color) {\n            context.fillStyle = color;\n            context.beginPath();\n            context.arc(x, y, size, 0, Math.PI * 2, false);\n            context.closePath();\n            context.fill();\n        }\n\n        function update() {\n            ball.x += ball.velocityX;\n            ball.y += ball.velocityY;\n\n            // Ball collision with top and bottom walls\n            if (ball.y + ball.size >= canvas.height || ball.y - ball.size <= 0) {\n                ball.velocityY = -ball.velocityY;\n            }\n\n            // Ball collision with paddles\n            if (ball.x - ball.size <= player.x + player.width && ball.y >= player.y && ball.y <= player.y + player.height) {\n                ball.velocityX = -ball.velocityX;\n            }\n\n            if (ball.x + ball.size >= ai.x && ball.y >= ai.y && ball.y <= ai.y + ai.height) {\n                ball.velocityX = -ball.velocityX;\n            }\n\n            // AI paddle movement\n            if (ball.y > ai.y + ai.height / 2) {\n                ai.y += 4;\n            } else {\n                ai.y -= 4;\n            }\n\n            // Reset ball if it goes out of bounds\n            if (ball.x - ball.size < 0) {\n                ai.score++;\n                resetBall();\n            } else if (ball.x + ball.size > canvas.width) {\n                player.score++;\n                resetBall();\n            }\n        }\n\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.velocityX = -ball.velocityX;\n        }\n\n        function draw() {\n            drawRect(0, 0, canvas.width, canvas.height, 'black');\n            drawRect(player.x, player.y, player.width, player.height, player.color);\n            drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);\n            drawBall(ball.x, ball.y, ball.size, 'white');\n            context.font = '35px Arial';\n            context.fillText(player.score, canvas.width / 4, canvas.height / 5);\n            context.fillText(ai.score, 3 * canvas.width / 4, canvas.height / 5);\n        }\n\n        function game() {\n            update();\n            draw();\n            requestAnimationFrame(game);\n        }\n\n        window.addEventListener('mousemove', (event) => {\n            const rect = canvas.getBoundingClientRect();\n            const mouseY = event.clientY - rect.top;\n            if (mouseY >= 0 && mouseY <= canvas.height - player.height) {\n                player.y = mouseY - player.height / 2;\n            }\n        });\n        window.addEventListener('keydown', (event) => {\n            if (event.key === 'ArrowUp' && player.y > 0) {\n                player.y -= 20;\n            } else if (event.key === 'ArrowDown' && player.y < canvas.height - player.height) {\n                player.y += 20;\n            }\n        });\n\n        game();\n    </script>\n</body>\n</html>\n
